<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Guest Check-in | Osaka Stay</title>
<style>
  :root { --gold:#c9a86a; --ink:#1c1a17; --cream:#faf7f0; }
  * { box-sizing: border-box; }
  body { margin:0; background:#171512; color:var(--cream);
         font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:32px 16px 64px; }
  h1 { text-align:center; font-size:26px; letter-spacing:.12em; margin:8px 0 4px; }
  .sub { text-align:center; color:#cfc7b8; font-size:13px; margin-bottom:18px; }
  .langs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:22px; }
  .langs button { border:1px solid #6b6254; background:transparent; color:var(--cream);
         border-radius:999px; padding:8px 16px; font-size:14px; cursor:pointer; }
  .langs button.on { background:var(--gold); border-color:var(--gold); color:#171512; font-weight:600; }
  .card { background:var(--cream); color:var(--ink); border-radius:16px; padding:24px 20px 28px; }
  .note { color:#6f675a; font-size:12.5px; margin:0 0 18px; line-height:1.7; }
  label { display:block; font-weight:600; font-size:14px; margin:18px 0 6px; }
  label .req { color:#c0392b; }
  label small { font-weight:normal; color:#8a8172; display:block; font-size:12px; margin-top:2px; }
  input, textarea { width:100%; padding:12px; font-size:16px; border:1px solid #d5ccb8;
         border-radius:10px; background:#fff; }
  textarea { min-height:74px; resize:vertical; }
  button.submit { width:100%; margin-top:26px; padding:15px; font-size:16px; font-weight:700;
         color:#171512; background:var(--gold); border:none; border-radius:10px; cursor:pointer; }
  button.submit:disabled { opacity:.5; }
  .done { text-align:center; padding:44px 10px; display:none; }
  .done .big { font-size:44px; }
  .privacy { color:#8a8172; font-size:11.5px; margin-top:16px; line-height:1.7; }
  .codebox { background:#f0e9da; border:1px dashed #c9a86a; border-radius:10px;
         padding:10px 12px; font-size:15px; letter-spacing:.06em; }
</style>
</head>
<body>
<div class="wrap">
  <h1>OSAKA STAY</h1>
  <div class="sub" data-i18n="sub"></div>

  <div class="langs" id="langs"></div>

  <div class="card" id="formCard">
    <p class="note" data-i18n="note"></p>
    <form id="ci">
      <label><span data-i18n="q_code"></span>
        <small data-i18n="q_code_s"></small></label>
      <div class="codebox" id="codeShow">-</div>

      <label><span data-i18n="q_names"></span> <span class="req">*</span>
        <small data-i18n="q_names_s"></small></label>
      <textarea id="f_names" required></textarea>

      <label><span data-i18n="q_natpass"></span> <span class="req">*</span>
        <small data-i18n="q_natpass_s"></small></label>
      <textarea id="f_natpass" required></textarea>

      <label><span data-i18n="q_contact"></span> <span class="req">*</span></label>
      <input id="f_contact" required>

      <label><span data-i18n="q_period"></span> <span class="req">*</span>
        <small data-i18n="q_period_s"></small></label>
      <input id="f_period" required>

      <button class="submit" type="submit" data-i18n="send"></button>
      <p class="privacy" data-i18n="privacy"></p>
    </form>
  </div>

  <div class="card done" id="doneCard">
    <div class="big">✅</div>
    <h2 data-i18n="thanks"></h2>
    <p data-i18n="thanks_s" style="color:#6f675a"></p>
  </div>
</div>

<script>
// ====== 送信先（Googleフォーム）======
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdiCJrhAlOSfemdd0mw8bHN9r4D_1rlLYigbLvroM2plAdryA/formResponse";
const ENTRY = { code:"entry.1291716912", names:"entry.597151491",
                natpass:"entry.1043140757", contact:"entry.969291366", period:"entry.1828523476" };

// ====== 多言語辞書 ======
const I18N = {
 en: { name:"EN", sub:"Guest Registration (required by Japanese law)",
   note:"Under Japanese law (Hotel Business Act), we must record every guest's name, nationality and passport number. Your information is used only for the legally required guest registry. Passport photos: please send via Airbnb message.",
   q_code:"Booking code", q_code_s:"Filled automatically from your link.",
   q_names:"Full names of ALL guests (as in passport)", q_names_s:"One name per line.",
   q_natpass:"Nationality & passport number for each guest", q_natpass_s:"e.g. France / 12AB34567 — one guest per line.",
   q_contact:"Contact (email or phone)",
   q_period:"Period of stay in Japan", q_period_s:"e.g. 2026/7/14 - 2026/7/28",
   send:"Submit", privacy:"Your information is used only for the guest registry required by Japanese law and is never shared with third parties.",
   thanks:"Thank you!", thanks_s:"Your check-in has been registered. We look forward to welcoming you!" },
 ja: { name:"日本語", sub:"宿泊者名簿のご登録（日本の法律で義務付けられています）",
   note:"旅館業法により、宿泊者全員の氏名・国籍・旅券番号の記録が義務付けられています。ご入力いただいた情報は宿泊者名簿のためだけに使用します。パスポート画像はAirbnbメッセージでお送りください。",
   q_code:"予約コード", q_code_s:"リンクから自動で入ります。",
   q_names:"宿泊者全員の氏名（パスポート表記）", q_names_s:"1行に1名ずつ。",
   q_natpass:"全員の国籍と旅券番号", q_natpass_s:"例：日本 / TR1234567 — 1行に1名ずつ。",
   q_contact:"連絡先（メールまたは電話）",
   q_period:"日本での滞在期間", q_period_s:"例：2026/7/14 - 2026/7/28",
   send:"送信する", privacy:"ご入力いただいた情報は、法令で定められた宿泊者名簿のためだけに使用し、第三者に提供することはありません。",
   thanks:"ありがとうございました！", thanks_s:"チェックイン登録が完了しました。お会いできるのを楽しみにしています。" },
 zh: { name:"中文", sub:"住宿登记（日本法律规定）",
   note:"根据日本法律（旅馆业法），我们必须记录每位住客的姓名、国籍和护照号码。您的信息仅用于法律要求的住宿名簿。护照照片请通过Airbnb消息发送。",
   q_code:"预订编号", q_code_s:"从链接自动填写。",
   q_names:"全部住客的姓名（与护照一致）", q_names_s:"每行一人。",
   q_natpass:"每位住客的国籍和护照号码", q_natpass_s:"例：China / E12345678 — 每行一人。",
   q_contact:"联系方式（邮箱或电话）",
   q_period:"在日本的停留期间", q_period_s:"例：2026/7/14 - 2026/7/28",
   send:"提交", privacy:"您的信息仅用于日本法律要求的住宿名簿，绝不会提供给第三方。",
   thanks:"谢谢！", thanks_s:"登记完成。期待您的光临！" },
 ko: { name:"한국어", sub:"숙박자 명부 등록 (일본 법률상 의무)",
   note:"일본 법률(여관업법)에 따라 모든 투숙객의 성명·국적·여권번호를 기록해야 합니다. 입력하신 정보는 법정 숙박자 명부에만 사용됩니다. 여권 사진은 Airbnb 메시지로 보내주세요.",
   q_code:"예약 코드", q_code_s:"링크에서 자동 입력됩니다.",
   q_names:"전체 투숙객 성명 (여권 표기)", q_names_s:"한 줄에 한 명씩.",
   q_natpass:"전원의 국적과 여권번호", q_natpass_s:"예: Korea / M12345678 — 한 줄에 한 명씩.",
   q_contact:"연락처 (이메일 또는 전화)",
   q_period:"일본 체류 기간", q_period_s:"예: 2026/7/14 - 2026/7/28",
   send:"제출", privacy:"입력하신 정보는 일본 법률상 필요한 숙박자 명부에만 사용되며 제3자에게 제공되지 않습니다.",
   thanks:"감사합니다!", thanks_s:"체크인 등록이 완료되었습니다. 만나뵙기를 기대합니다!" },
 fr: { name:"FR", sub:"Registre des voyageurs (obligatoire selon la loi japonaise)",
   note:"Selon la loi japonaise, nous devons enregistrer le nom, la nationalité et le numéro de passeport de chaque voyageur. Vos informations ne servent qu'au registre légal. Photos de passeport : envoyez-les via message Airbnb.",
   q_code:"Code de réservation", q_code_s:"Rempli automatiquement depuis votre lien.",
   q_names:"Noms complets de TOUS les voyageurs (comme sur le passeport)", q_names_s:"Un nom par ligne.",
   q_natpass:"Nationalité et numéro de passeport de chacun", q_natpass_s:"ex. France / 12AB34567 — une personne par ligne.",
   q_contact:"Contact (e-mail ou téléphone)",
   q_period:"Période de séjour au Japon", q_period_s:"ex. 2026/7/14 - 2026/7/28",
   send:"Envoyer", privacy:"Vos informations ne sont utilisées que pour le registre des voyageurs exigé par la loi japonaise et ne sont jamais partagées.",
   thanks:"Merci !", thanks_s:"Votre enregistrement est terminé. Au plaisir de vous accueillir !" },
 de: { name:"DE", sub:"Gästeregistrierung (nach japanischem Recht erforderlich)",
   note:"Nach japanischem Recht müssen wir Name, Nationalität und Passnummer aller Gäste erfassen. Ihre Daten werden nur für das gesetzlich vorgeschriebene Gästeregister verwendet. Passfotos bitte per Airbnb-Nachricht senden.",
   q_code:"Buchungscode", q_code_s:"Wird automatisch aus Ihrem Link übernommen.",
   q_names:"Vollständige Namen ALLER Gäste (wie im Pass)", q_names_s:"Ein Name pro Zeile.",
   q_natpass:"Nationalität und Passnummer jedes Gastes", q_natpass_s:"z. B. Germany / C01X0006H — eine Person pro Zeile.",
   q_contact:"Kontakt (E-Mail oder Telefon)",
   q_period:"Aufenthaltszeitraum in Japan", q_period_s:"z. B. 2026/7/14 - 2026/7/28",
   send:"Absenden", privacy:"Ihre Daten werden ausschließlich für das gesetzlich vorgeschriebene Gästeregister verwendet und niemals weitergegeben.",
   thanks:"Vielen Dank!", thanks_s:"Ihre Registrierung ist abgeschlossen. Wir freuen uns auf Sie!" },
 es: { name:"ES", sub:"Registro de huéspedes (obligatorio por la ley japonesa)",
   note:"Según la ley japonesa, debemos registrar el nombre, la nacionalidad y el número de pasaporte de cada huésped. Su información solo se usa para el registro legal. Fotos del pasaporte: envíelas por mensaje de Airbnb.",
   q_code:"Código de reserva", q_code_s:"Se rellena automáticamente desde su enlace.",
   q_names:"Nombres completos de TODOS los huéspedes (como en el pasaporte)", q_names_s:"Un nombre por línea.",
   q_natpass:"Nacionalidad y número de pasaporte de cada uno", q_natpass_s:"ej. Spain / PAB123456 — una persona por línea.",
   q_contact:"Contacto (correo o teléfono)",
   q_period:"Período de estancia en Japón", q_period_s:"ej. 2026/7/14 - 2026/7/28",
   send:"Enviar", privacy:"Su información se utiliza únicamente para el registro de huéspedes exigido por la ley japonesa y nunca se comparte.",
   thanks:"¡Gracias!", thanks_s:"Su registro se ha completado. ¡Esperamos darle la bienvenida!" },
};

// ====== 言語切り替え ======
const order = ["en","zh","ja","ko","fr","de","es"];
const langsDiv = document.getElementById("langs");
order.forEach(k => {
  const b = document.createElement("button");
  b.type = "button"; b.textContent = I18N[k].name; b.dataset.lang = k;
  b.onclick = () => setLang(k);
  langsDiv.appendChild(b);
});
function setLang(k) {
  document.querySelectorAll(".langs button").forEach(b => b.classList.toggle("on", b.dataset.lang === k));
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const t = I18N[k][el.dataset.i18n]; if (t) el.textContent = t;
  });
  document.documentElement.lang = k;
  localStorage.setItem("ci_lang", k);
}
// ブラウザ言語で初期表示
const nav = (navigator.language || "en").slice(0,2);
setLang(localStorage.getItem("ci_lang") || (I18N[nav] ? nav : "en"));

// ====== 予約コード（URLの ?code= から）======
const code = new URLSearchParams(location.search).get("code") || "";
document.getElementById("codeShow").textContent = code || "—";

// ====== 送信（Googleフォームへ）======
document.getElementById("ci").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.querySelector("button.submit");
  btn.disabled = true;
  const fd = new FormData();
  fd.append(ENTRY.code, code || "(no code)");
  fd.append(ENTRY.names, document.getElementById("f_names").value);
  fd.append(ENTRY.natpass, document.getElementById("f_natpass").value);
  fd.append(ENTRY.contact, document.getElementById("f_contact").value);
  fd.append(ENTRY.period, document.getElementById("f_period").value);
  try { await fetch(FORM_URL, { method:"POST", mode:"no-cors", body:fd }); } catch(_) {}
  document.getElementById("formCard").style.display = "none";
  document.getElementById("doneCard").style.display = "block";
  window.scrollTo(0,0);
});
</script>
</body>
</html>
